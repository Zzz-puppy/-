server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: xyz-market
  datasource:
    url: jdbc:h2:file:./data/xyz_market;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:init-h2.sql
      encoding: UTF-8
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 文件上传
file:
  upload-dir: ./uploads

# MyBatis 配置（不使用 MyBatis-Plus）
mybatis:
  type-aliases-package: com.example.xyzmarket.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# 微信小程序配置
wx:
  appid: your_appid
  secret: your_secret

# JWT 配置
jwt:
  secret: your_jwt_secret_key_at_least_256_bits_long_for_security
  expiration: 604800000  # 7天（单位：毫秒）

# 管理员入口密码
admin:
  password: admin123

# 腾讯云 IM 配置
tencent:
  im:
    sdkAppId: 0
    secretKey: your_secret_key